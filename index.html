<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RévisSeconde Pro — Studio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

  <div class="app-container">
    
    <main class="main-content">
      
      <section id="home-screen">
        <div class="mobile-header">
          <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase;">Objectif Lycée</span>
          <h1 style="margin: 0; font-size: 1.4rem; font-weight: 800;">Mon Programme Seconde</h1>
        </div>
        <div id="matieres-container"></div>
      </section>

      <section id="pre-quiz-screen" style="display: none;">
        <button onclick="goHome()" style="background: none; border: none; color: var(--color-primary); font-weight: 700; cursor: pointer; margin-bottom: 16px; padding: 0;">⬅️ Retour au programme</button>
        
        <div style="margin-bottom: 20px;">
          <span id="chapter-matiere-badge" class="badge-theme">Matière</span>
          <h2 id="pre-quiz-title" style="margin: 6px 0 0 0; font-size: 1.3rem; font-weight: 800;">Titre du Chapitre</h2>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;">
          <button class="btn-primary" onclick="switchChapterSubView('view-summary')">📝 Résumé & Fondamentaux</button>
          <button class="btn-success" onclick="switchChapterSubView('view-exercises')">🎯 Exercices de Révision</button>
          <button class="btn-secondary" onclick="preparerModificationChapitre()">✏️ Modifier le chapitre / l'enrichir</button>
        </div>

        <div id="sub-view-summary" class="chapter-sub-view">
          <div class="card">
            <h4 style="margin: 0 0 8px 0; font-size: 0.8rem; color: var(--color-primary); text-transform: uppercase;">Synthèse de Révision</h4>
            <p id="pre-quiz-cours-text" style="margin: 0; font-size: 0.9rem; line-height: 1.5; white-space: pre-line;"></p>
          </div>
          <div id="wrapper-piege" class="card" style="background: #FFF5F5; border-color: #FED7D7;">
            <h4 style="margin: 0 0 6px 0; font-size: 0.8rem; color: #C53030; text-transform: uppercase;">Piège à éviter</h4>
            <p id="pre-quiz-piege-text" style="margin: 0; font-size: 0.85rem; color: #9B1C1C;"></p>
          </div>
        </div>

        <div id="sub-view-exercises" class="chapter-sub-view" style="display:none;">
          <div class="card" style="border-left: 4px solid #10B981;">
            <h4 style="margin: 0 0 6px 0; font-size: 0.8rem; color: #10B981; text-transform: uppercase;">Auto-Évaluation</h4>
            <p style="margin: 0 0 12px 0; font-size: 0.88rem; color: var(--text-secondary);">Es-tu capable de restituer ces notions ? Réponds mentalement puis vérifie.</p>
            <button class="btn-primary" style="background:#10B981; min-height:36px; font-size:0.8rem;" onclick="genererQuizFlash()">Générer une question de révision</button>
            <div id="box-quiz-flash" style="margin-top:14px; padding-top:12px; border-top:1px dashed #E2E8F0; display:none;">
              <p id="text-quiz-question" style="font-weight:700; font-size:0.9rem; margin:0 0 10px 0;"></p>
              <button class="btn-secondary" id="btn-reveal-flash" style="min-height:32px; font-size:0.75rem;">👁️ Voir la réponse attendue</button>
              <p id="text-quiz-reponse" style="margin:10px 0 0 0; font-size:0.88rem; background:#F1F5F9; padding:10px; border-radius:8px; display:none; white-space:pre-line;"></p>
            </div>
          </div>
        </div>
      </section>

    </main>

    <div id="modal-add-chapter" class="modal-backdrop">
      <div class="modal-window">
        <div class="tabs-header" id="modal-tabs-bar">
          <button class="tab-btn active" onclick="switchIngestTab('tab-text')">✍️ Saisie</button>
          <button class="tab-btn" onclick="switchIngestTab('tab-photo')">📸 Photo</button>
          <button class="tab-btn" onclick="switchIngestTab('tab-link')">🔗 Lien</button>
        </div>

        <div style="padding: 16px 16px 0 16px;">
          <label style="font-size:0.75rem; font-weight:700; color:var(--text-secondary); display:block; margin-bottom:4px;">TITRE DU CHAPITRE</label>
          <input type="text" id="input-new-chap-title" class="input-field" placeholder="Nom du chapitre (ex: Les Vecteurs)">
        </div>

        <div id="tab-text" class="tab-content" style="display: block;">
          <label style="font-size:0.75rem; font-weight:700; color:var(--text-secondary); display:block; margin-bottom:4px;">CONTENU DU TEXTE / NOTES</label>
          <textarea id="area-ingest-text" class="input-field" style="height: 120px; resize: none;" placeholder="Colle ton cours ou tes nouvelles formules ici..."></textarea>
        </div>

        <div id="tab-photo" class="tab-content">
          <div class="file-dropzone" onclick="$('file-camera-input').click()">
            <span style="font-size: 1.5rem; display: block;">📷</span>
            <span style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 600;">Numériser une nouvelle page</span>
            <input type="file" id="file-camera-input" accept="image/*" style="display: none;">
          </div>
          <div id="ocr-status-container" style="display: none; flex-direction: column; align-items: center; gap: 8px; margin-top: 10px;">
            <div style="width: 20px; height: 20px; border: 3px solid #E2E8F0; border-top-color: var(--color-primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <span style="font-size: 0.75rem; font-weight: 700; color: var(--color-primary);">Numérisation...</span>
          </div>
        </div>

        <div id="tab-link" class="tab-content">
          <label style="font-size:0.75rem; font-weight:700; color:var(--text-secondary); display:block; margin-bottom:4px;">LIEN WEB ASSOCIÉ</label>
          <input type="url" id="input-ingest-url" class="input-field" placeholder="https://lien-cours.fr">
        </div>

        <div style="padding: 0 16px 16px 16px; display: flex; gap: 10px;">
          <button class="btn-secondary" onclick="closeAddChapterModal()">Annuler</button>
          <button id="btn-submit-new-chap" class="btn-primary">Enregistrer</button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <button id="nav-home" class="nav-item">🏠 Menu Principal</button>
    </nav>

  </div>

  <script src="app.js"></script>
</body>
</html>
